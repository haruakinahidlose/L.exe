<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Totally Normal Link</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      margin: 0;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    .ipad-frame {
      width: min(90vw, 600px);
      aspect-ratio: 3 / 4;
      border-radius: 30px;
      border: 10px solid #222;
      box-shadow: 0 0 40px rgba(0,0,0,0.8);
      overflow: hidden;
      background: #000;
      position: relative;
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #000;
    }
  </style>
</head>
<body>
  <div class="ipad-frame">
    <video autoplay muted playsinline>
      <source src="ipad-restart.mp4" type="video/mp4" />
      Your browser does not support the video tag.
    </video>
  </div>
</body>
</html>
