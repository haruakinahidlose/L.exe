<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Loading...</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  html,body{
    margin:0;
    background:#000;
    height:100%;
    overflow:hidden;
    cursor:none;
  }
  #img{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:contain;
    display:none;
  }
</style>
</head>
<body>

<audio id="s" src="lol.mp3"></audio>
<img id="img" src="lol.png">

<script>
  // Play startup sound immediately
  const s = document.getElementById("s");
  const img = document.getElementById("img");

  // Try autoplay (mobile may require tap)
  s.play().catch(()=>{});

  // On any tap/click → show prank screen
  document.addEventListener("click",()=>{
    s.play();
    img.style.display="block";
  });

  // Disable right-click (prank effect only)
  document.addEventListener("contextmenu", e => e.preventDefault());
</script>

</body>
</html>
